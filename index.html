<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Review Roulette</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --gold: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        .panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; text-align: center; margin-bottom: 20px; }
        canvas#canvas { max-width: 100%; height: auto; }
        .power-bar-bg { width: 80%; height: 20px; background: #eee; border-radius: 10px; margin: 20px auto; overflow: hidden; border: 1px solid #ddd; }
        #power-bar-fill { width: 0%; height: 100%; background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c); transition: width 0.1s; }
        .btn-spin { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 30px; cursor: pointer; width: 80%; box-shadow: 0 4px #1a252f; }
        .btn-spin:active { transform: translateY(2px); box-shadow: 0 2px #1a252f; }
        .stats { display: flex; justify-content: space-around; width: 100%; margin-top: 15px; font-size: 1.1rem; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.4); z-index: 100; text-align: center; width: 90%; max-width: 400px; border: 4px solid var(--primary); }
        input[type="text"] { padding: 12px; width: 85%; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2 style="margin: 0 0 10px 0; color: var(--primary);">First English Class Review</h2>
        <canvas id="canvas" width="500" height="500"></canvas>
        <div class="power-bar-bg"><div id="power-bar-fill"></div></div>
        <button class="btn-spin" id="spinBtn">HOLD TO CHARGE</button>
        <div class="stats">
            <p>Score: <b id="score" style="color: #27ae60;">0</b></p>
            <p>Questions Left: <b id="left">14</b></p>
        </div>
        <button onclick="location.reload()" style="margin-top:15px; background:none; border:none; color:#95a5a6; cursor:pointer; text-decoration: underline;">Reset Game</button>
    </div>
</div>

<div id="modal" class="modal">
    <h3 id="modal-q" style="color: var(--primary);">Question</h3>
    <input type="text" id="answerInput" placeholder="Type answer..." autocomplete="off">
    <br><br>
    <button onclick="checkAnswer()" class="btn-spin" style="padding: 10px 30px; width: auto;">Submit</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const leftEl = document.getElementById('left');
    const powerFill = document.getElementById('power-bar-fill');
    
    let score = 0;
    let questions = [
        {q: "My father's sister is my...", a: "aunt", color: "#e74c3c"},
        {q: "I _____ 30 years old.", a: "am", color: "#3498db"},
        {q: "She _____ blue eyes.", a: "has", color: "#2ecc71"},
        {q: "They _____ pizza.", a: "like", color: "#f1c40f"},
        {q: "He _____ from Mexico.", a: "is", color: "#9b59b6"},
        {q: "My mother's son is my...", a: "brother", color: "#1abc9c"},
        {q: "I _____ blonde hair.", a: "have", color: "#e67e22"},
        {q: "He _____ music.", a: "likes", color: "#34495e"},
        {q: "I work _____ 9:00 to 5:00.", a: "from", color: "#d35400"},
        {q: "She _____ tall.", a: "is", color: "#c0392b"},
        {q: "We _____ brown eyes.", a: "have", color: "#27ae60"},
        {q: "I _____ from China.", a: "am", color: "#2980b9"},
        {q: "I work from 8:00 _____ 4:00.", a: "to", color: "#8e44ad"},
        {q: "My father's father is my...", a: "grandfather", color: "#16a085"}
    ];
    
    let specials = [
        {q: "BANKRUPT", a: "SPECIAL", color: "black"},
        {q: "x2", a: "SPECIAL", color: "gold"}
    ];

    let startAngle = 0;
    let isCharging = false;
    let chargeStart = 0;

    function getActiveSlices() {
        return [...specials, ...questions];
    }

    function draw() {
        const activeSlices = getActiveSlices();
        const numSlices = activeSlices.length;
        const arc = (Math.PI * 2) / numSlices;
        ctx.clearRect(0,0,500,500);
        ctx.font = "bold 16px Arial";
        activeSlices.forEach((slice, i) => {
            const angle = startAngle + i * arc;
            ctx.fillStyle = slice.color;
            ctx.beginPath(); ctx.moveTo(250,250); ctx.arc(250,250,230,angle,angle+arc); ctx.fill();
            ctx.save();
            ctx.translate(250+Math.cos(angle+arc/2)*170, 250+Math.sin(angle+arc/2)*170);
            ctx.rotate(angle+arc/2+Math.PI/2);
            ctx.fillStyle = (slice.color === "black") ? "white" : "black";
            const text = (slice.a === "SPECIAL") ? slice.q : "?";
            ctx.fillText(text, -ctx.measureText(text).width/2, 0);
            ctx.restore();
        });
        ctx.fillStyle = "#e74c3c"; ctx.beginPath(); ctx.moveTo(230,15); ctx.lineTo(270,15); ctx.lineTo(250,50); ctx.fill();
    }

    function startCharge() { if(isCharging || questions.length === 0) return; isCharging = true; chargeStart = Date.now(); requestAnimationFrame(updateBar); }
    function updateBar() { if(!isCharging) return; let p = Math.min((Date.now()-chargeStart)/1500, 1); powerFill.style.width = (p*100)+"%"; requestAnimationFrame(updateBar); }
    function releaseCharge() { if(!isCharging) return; isCharging = false; let p = Math.min((Date.now()-chargeStart)/1500, 1); powerFill.style.width = "0%"; spin(p); }
    
    function spin(p) { 
        let s = (Math.random()*20) + (p*50); 
        let t = 0; let tt = 3000 + (p*2000); 
        function anim() { 
            t+=30; if(t>=tt) { finalize(); return; } 
            startAngle += ((s - (t/tt)*s) * Math.PI/180); 
            draw(); requestAnimationFrame(anim); 
        } 
        anim(); 
    }

    function finalize() { 
        const activeSlices = getActiveSlices();
        const numSlices = activeSlices.length;
        let deg = (startAngle * 180 / Math.PI + 90) % 360; 
        let idx = Math.floor((360 - deg) / (360 / numSlices)) % numSlices; 
        let selected = activeSlices[idx];

        if (selected.q === "BANKRUPT") { 
            alert("Bankrupt! Score reset to 0."); score = 0; 
            specials = specials.filter(s => s.q !== "BANKRUPT"); // REMOVE after use
        } 
        else if (selected.q === "x2") { 
            alert("Double Points!"); score *= 2; 
            specials = specials.filter(s => s.q !== "x2"); // REMOVE after use
        } 
        else { 
            // Find the real index in the questions array
            let qIdx = questions.indexOf(selected);
            showModal(selected, qIdx); 
        }
        scoreEl.innerText = score;
        draw();
    }

    function showModal(qObj, realIdx) {
        window.currentQ = qObj;
        window.currentQIdx = realIdx;
        document.getElementById('modal-q').innerText = qObj.q;
        document.getElementById('modal').style.display = 'block';
        setTimeout(() => document.getElementById('answerInput').focus(), 100);
    }

    function checkAnswer() {
        let val = document.getElementById('answerInput').value.toLowerCase().trim();
        if (val === window.currentQ.a) {
            alert("Correct!");
            score += 10;
            questions.splice(window.currentQIdx, 1);
        } else {
            alert("Incorrect. The answer was: " + window.currentQ.a);
        }
        document.getElementById('modal').style.display = 'none';
        document.getElementById('answerInput').value = "";
        scoreEl.innerText = score;
        leftEl.innerText = questions.length;
        draw();
        if (questions.length === 0) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            const finalSound = new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_062564a5f5.mp3');
            finalSound.play();
            setTimeout(() => alert("Great job!"), 500);
        }
    }

    const b = document.getElementById('spinBtn');
    b.onmousedown = b.ontouchstart = (e) => { e.preventDefault(); startCharge(); };
    window.onmouseup = window.ontouchend = releaseCharge;
    draw();
</script>
</body>
</html>
