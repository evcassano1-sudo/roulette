<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Review Roulette</title>
    <style>
        :root { --primary: #2c3e50; --gold: #f1c40f; --gray: #95a5a6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        .panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; text-align: center; margin-bottom: 20px; }
        canvas { max-width: 100%; height: auto; }
        .power-bar-bg { width: 80%; height: 20px; background: #eee; border-radius: 10px; margin: 20px auto; overflow: hidden; border: 1px solid #ddd; }
        #power-bar-fill { width: 0%; height: 100%; background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c); transition: width 0.1s; }
        .btn-spin { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 30px; cursor: pointer; width: 80%; box-shadow: 0 4px #1a252f; }
        .btn-spin:active { transform: translateY(2px); box-shadow: 0 2px #1a252f; }
        .stats { display: flex; justify-content: space-around; width: 100%; margin-top: 15px; font-size: 1.1rem; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.4); z-index: 100; text-align: center; width: 90%; max-width: 400px; border: 4px solid var(--primary); }
        input[type="text"] { padding: 12px; width: 85%; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2 style="margin: 0 0 10px 0; color: var(--primary);">Class 1 Review</h2>
        <canvas id="canvas" width="500" height="500"></canvas>
        <div class="power-bar-bg"><div id="power-bar-fill"></div></div>
        <button class="btn-spin" id="spinBtn">HOLD TO CHARGE</button>
        <div class="stats">
            <p>Score: <b id="score" style="color: #27ae60;">0</b></p>
            <p>Progress: <b id="correct">0</b>/14</p>
        </div>
        <button onclick="location.reload()" style="margin-top:15px; background:none; border:none; color:#95a5a6; cursor:pointer; text-decoration: underline;">Reset Game</button>
    </div>
</div>

<div id="modal" class="modal">
    <h3 id="modal-q" style="color: var(--primary);">Question</h3>
    <input type="text" id="answerInput" placeholder="Type answer..." autocomplete="off">
    <br><br>
    <button onclick="checkAnswer()" class="btn-spin" style="padding: 10px 30px; width: auto;">Submit</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const correctEl = document.getElementById('correct');
    const powerFill = document.getElementById('power-bar-fill');
    
    let score = 0, correct = 0;
    const questions = [
        {q: "My father's sister is my...", a: "aunt"},
        {q: "I _____ 30 years old.", a: "am"},
        {q: "She _____ blue eyes.", a: "has"},
        {q: "They _____ to eat pizza.", a: "like"},
        {q: "He _____ from Mexico.", a: "is"},
        {q: "My mother's son is my...", a: "brother"},
        {q: "I _____ blonde hair.", a: "have"},
        {q: "He _____ music.", a: "likes"},
        {q: "I work _____ 9:00 to 5:00.", a: "from"},
        {q: "She _____ tall.", a: "is"},
        {q: "We _____ brown eyes.", a: "have"},
        {q: "I _____ from China.", a: "am"},
        {q: "I work from 8:00 _____ 4:00.", a: "to"},
        {q: "My father's father is my...", a: "grandfather"}
    ];
    
    const slices = 16;
    const arc = Math.PI / (slices / 2);
    let startAngle = 0;
    let isCharging = false;
    let chargeStart = 0;
    let sliceStatus = Array(16).fill('active');
    const colors = ["#e74c3c", "#3498db", "#2ecc71", "#f1c40f", "#9b59b6", "#1abc9c", "#e67e22", "#34495e", "#d35400", "#c0392b", "#27ae60", "#2980b9", "#8e44ad", "#16a085", "#ff9ff3"];

    function draw() {
        ctx.clearRect(0,0,500,500);
        ctx.font = "bold 16px Arial";
        for(let i=0; i<slices; i++) {
            const angle = startAngle + i * arc;
            if (i === 0) ctx.fillStyle = "black";
            else if (i === 1) ctx.fillStyle = "gold";
            else ctx.fillStyle = (sliceStatus[i] === 'gray' ? "#95a5a6" : colors[i-2]);
            
            ctx.beginPath(); ctx.moveTo(250,250); ctx.arc(250,250,230,angle,angle+arc); ctx.fill();
            ctx.save();
            ctx.translate(250+Math.cos(angle+arc/2)*180, 250+Math.sin(angle+arc/2)*180);
            ctx.rotate(angle+arc/2+Math.PI/2);
            ctx.fillStyle = (i === 0) ? "white" : "black";
            const text = (i === 0) ? "BANKRUPT" : (i === 1) ? "x2" : (sliceStatus[i] === 'gray' ? "✔" : "?");
            ctx.fillText(text, -ctx.measureText(text).width/2, 0);
            ctx.restore();
        }
        ctx.fillStyle = "#e74c3c"; ctx.beginPath(); ctx.moveTo(230,15); ctx.lineTo(270,15); ctx.lineTo(250,50); ctx.fill();
    }

    function startCharge() { if(isCharging) return; isCharging = true; chargeStart = Date.now(); requestAnimationFrame(updateBar); }
    function updateBar() { if(!isCharging) return; let p = Math.min((Date.now()-chargeStart)/1500, 1); powerFill.style.width = (p*100)+"%"; requestAnimationFrame(updateBar); }
    function releaseCharge() { if(!isCharging) return; isCharging = false; let p = Math.min((Date.now()-chargeStart)/1500, 1); powerFill.style.width = "0%"; spin(p); }
    
    function spin(p) { 
        let validIndices = [];
        for(let i=0; i<slices; i++){
            if(sliceStatus[i] === 'active' || i < 2) validIndices.push(i);
        }
        if (validIndices.length <= 2 && validIndices.includes(0) && validIndices.includes(1)) {
            // Only Bankrupt and x2 left
        } else if (validIndices.length > 2) {
            // Remove Bankrupt and x2 from random selection if questions are left to avoid frustration
            validIndices = validIndices.filter(idx => idx > 1);
        }

        let targetIdx = validIndices[Math.floor(Math.random()*validIndices.length)];
        let totalSlicesToSpin = (slices * 5) + (slices - targetIdx); 
        let targetRotation = totalSlicesToSpin * arc;
        
        let startTime = null;
        let duration = 4000 + (p * 2000);
        let initialAngle = startAngle;

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            let elapsed = timestamp - startTime;
            let progress = Math.min(elapsed / duration, 1);
            
            // Ease out cubic function for smooth stopping
            let easeOut = 1 - Math.pow(1 - progress, 3);
            startAngle = initialAngle + (targetRotation * easeOut);
            
            draw();
            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                stop(targetIdx);
            }
        }
        requestAnimationFrame(animate);
    }

    function stop(idx) { 
        if(idx === 0){ alert("Bankrupt! Score is 0."); score=0; } 
        else if(idx === 1){ alert("x2! Points doubled!"); score *= 2; } 
        else { showQ(idx); } 
        scoreEl.innerText = score; draw(); 
    }

    function showQ(idx) { 
        window.curIdx = idx; 
        let q = questions[correct];
        document.getElementById('modal-q').innerText = q.q; 
        window.ans = q.a.toLowerCase().trim(); 
        document.getElementById('modal').style.display='block'; 
        setTimeout(() => document.getElementById('answerInput').focus(), 100);
    }

    function checkAnswer() { 
        let a = document.getElementById('answerInput').value.toLowerCase().trim(); 
        if(a===window.ans){ 
            alert("Correct!"); 
            score+=5; 
            correct++; 
            sliceStatus[window.curIdx]='gray'; 
        } else { 
            alert("Not quite. The answer is: "+window.ans); 
        } 
        scoreEl.innerText=score; 
        correctEl.innerText=correct; 
        document.getElementById('modal').style.display='none'; 
        document.getElementById('answerInput').value=""; 
        draw(); 
        if(correct === 14) setTimeout(() => alert("✨ Review Complete! Great job! ✨"), 500);
    }
    
    const b = document.getElementById('spinBtn');
    b.onmousedown = b.ontouchstart = (e) => { e.preventDefault(); startCharge(); };
    window.onmouseup = window.ontouchend = releaseCharge;
    window.onkeydown = (e) => { if(e.key === "ArrowUp") startCharge(); if(e.key === "Enter" && document.getElementById('modal').style.display === 'block') checkAnswer(); };
    window.onkeyup = (e) => { if(e.key === "ArrowUp") releaseCharge(); };
    draw();
</script>
</body>
</html>
